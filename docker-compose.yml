version: '3.8'

services:
  lifepilot-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lifepilot-os
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash
    volumes:
      - ./sandbox:/app/sandbox
      - ./lifepilot.db:/app/lifepilot.db
    restart: always
